apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: fastapi-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Tabeebashraf7/fastapi-argocd-demo.git
    targetRevision: master
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
